<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trace AI Layer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="popup-header">
      <div class="header-row">
        <div class="brand-mark-wrap">
          <img class="brand-mark" src="trace-mark.svg" alt="Trace logo" />
        </div>
        <div class="brand-copy">
          <div class="brand-topline">Trace</div>
          <div class="tagline">Prompt Clarity Studio</div>
        </div>
        <div class="header-badge">Live</div>
      </div>
      <div class="header-note">Analyze, tighten, and replace prompts without leaving the page.</div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="optimize">Optimize</button>
        <button class="tab-btn" data-tab="history">History</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </nav>
    </header>

    <main>
      <!-- Tab 1: Optimize current prompt -->
      <section id="tab-optimize" class="tab-panel active">
        <div id="optimize-content"></div>
      </section>

      <!-- Tab 2: Session history / summary -->
      <section id="tab-history" class="tab-panel">
        <div id="history-content"></div>
      </section>

      <!-- Tab 3: Settings -->
      <section id="tab-settings" class="tab-panel">
        <div id="settings-content"></div>
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
