<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trace AI Layer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Trace AI Layer</h1>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="summary">Summary</button>
        <button class="tab-btn" data-tab="last-prompt">Last Prompt</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </nav>
    </header>

    <main>
      <!-- Tab 1: Session Summary -->
      <section id="tab-summary" class="tab-panel active">
        <div id="totals"></div>
        <button id="open-dashboard">Open Dashboard</button>
      </section>

      <!-- Tab 2: Last Prompt -->
      <section id="tab-last-prompt" class="tab-panel">
        <div id="last-prompt-content"></div>
      </section>

      <!-- Tab 3: Settings -->
      <section id="tab-settings" class="tab-panel">
        <div id="settings-content"></div>
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
